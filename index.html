<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassMatrix // Student Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: #131b2e;
            --bg-card: #1e2942;
            --border-subtle: #2d3d63;
            --brand-primary: #38bdf8;
            --brand-glow: rgba(56, 189, 248, 0.25);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-main: #f87171;
        }

        *:focus-visible {
            outline: 3px solid var(--brand-primary);
            outline-offset: 4px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            padding: 40px 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 40px auto;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 8px;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card-entry {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 24px;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .card-entry:hover {
            transform: translateY(-4px);
            border-color: var(--brand-primary);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.6), 0 0 20px var(--brand-glow);
        }

        .student-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .student-name {
            font-weight: 700;
            font-size: 1.25rem;
        }

        .student-id {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .action-container {
            display: flex;
            justify-content: flex-end;
        }

        .action-tag {
            color: #ffffff;
            background: var(--brand-primary);
            border: none;
            padding: 8px 18px;
            font-size: 0.875rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .card-entry:hover .action-tag {
            background: #7dd3fc;
        }

        .hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(7, 10, 18, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 30px;
        }

        .hud-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            padding: 16px 24px;
            border-radius: 12px 12px 0 0;
        }

        .mainframe-title {
            font-weight: 700;
        }

        .close-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #ef4444;
            color: #ffffff;
        }

        .terminal-workspace {
            display: flex;
            flex: 1;
            border: 1px solid var(--border-subtle);
            background: #000000;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }

        .matrix-alert-panel {
            width: 320px;
            border-right: 1px solid var(--border-subtle);
            padding: 30px;
            background: var(--bg-surface);
        }

        .typing-line {
            color: var(--brand-primary);
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
        }

        .matrix-alert-panel.active .line-1 { animation: typing 1s forwards; }
        .matrix-alert-panel.active .line-2 { animation: typing 1s 1s forwards; }

        .viewer-viewport {
            flex: 1;
            background: #ffffff;
            border: none;
        }

        @keyframes typing { to { width: 100% } }

        @media (max-width: 900px) {
            .terminal-workspace { flex-direction: column; }
            .matrix-alert-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border-subtle); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="Senorita __ Zindagi Na Milegi Dobara __ Cello Instrumental Cover __ wwwsoundspiritin.mp3" type="audio/mpeg">
    </audio>

    <header>
        <h1>Student Results Dashboard</h1>
        <div class="subtitle">Select any individual student file card below to fetch records directly from storage vaults.</div>
    </header>

    <main class="roster-grid">
        <div class="card-entry" role="button" tabindex="0" data-matrix="student1.pdf" data-id="student_alpha">
            <div class="student-info">
                <span class="student-name">Student Alpha</span>
                <span class="student-id">FILE ID: #7701</span>
            </div>
            <div class="action-container"><button class="action-tag" tabindex="-1">View Profile</button></div>
        </div>

        <div class="card-entry" role="button" tabindex="0" data-matrix="student2.pdf" data-id="student_beta">
            <div class="student-info">
                <span class="student-name">Student Beta</span>
                <span class="student-id">FILE ID: #7702</span>
            </div>
            <div class="action-container"><button class="action-tag" tabindex="-1">View Profile</button></div>
        </div>

        <div class="card-entry" role="button" tabindex="0" data-matrix="student3.pdf" data-id="student_gamma">
            <div class="student-info">
                <span class="student-name">Student Gamma</span>
                <span class="student-id">FILE ID: #7703</span>
            </div>
            <div class="action-container"><button class="action-tag" tabindex="-1">View Profile</button></div>
        </div>
    </main>

    <div id="hudOverlay" class="hud-overlay" role="dialog" aria-modal="true">
        <div class="terminal-header">
            <div id="mainframeTitle" class="mainframe-title">Documents Vault</div>
            <button id="closeFrameBtn" class="close-btn">Close Panel</button>
        </div>
        <div class="terminal-workspace">
            <div id="matrixAlert" class="matrix-alert-panel">
                <div id="typeLine1" class="typing-line line-1">Connecting to server...</div>
                <div id="typeLine2" class="typing-line line-2">Fetching file contents...</div>
            </div>
            <iframe id="coreViewer" class="viewer-viewport" title="Document Viewer"></iframe>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jnoukcxlbslsyieqbvtr.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impub3VrY3hsYnNsc3lpZXFidnRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDIzMjgsImV4cCI6MjA5NDYxODMyOH0.RfJGDu8tF9v3hzWrAzyKxGypxR2iUUWY15u5T8wyKZg'; 

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BUCKET_NAME = 'STUDENTS-RESULT'; 

        const cards = document.querySelectorAll('.card-entry');
        const hudOverlay = document.getElementById('hudOverlay');
        const coreViewer = document.getElementById('coreViewer');
        const closeFrameBtn = document.getElementById('closeFrameBtn');
        const mainframeTitle = document.getElementById('mainframeTitle');
        const matrixAlert = document.getElementById('matrixAlert');
        const typeLine1 = document.getElementById('typeLine1');
        const typeLine2 = document.getElementById('typeLine2');
        const bgMusic = document.getElementById('bgMusic');

        let activeTriggerElement = null;

        cards.forEach(card => {
            const runSelection = async () => {
                activeTriggerElement = card;
                if (bgMusic.paused) { bgMusic.play().catch(() => {}); }
                
                const fileName = card.getAttribute('data-matrix');
                const targetName = card.getAttribute('data-id');

                matrixAlert.classList.remove('active');
                void matrixAlert.offsetWidth; 

                mainframeTitle.textContent = `Connecting...`;
                typeLine1.textContent = `Accessing secure vault...`;
                typeLine2.textContent = `Streaming document stream...`;
                hudOverlay.classList.add('visible');
                matrixAlert.classList.add('active');

                try {
                    const { data, error } = await supabaseClient.storage
                        .from(BUCKET_NAME)
                        .download(fileName);

                    if (error) throw error;

                    const blobUrl = URL.createObjectURL(data);
                    coreViewer.src = blobUrl;
                    mainframeTitle.textContent = `Document Open: ${targetName.toUpperCase()}`;

                } catch (err) {
                    mainframeTitle.textContent = `Access Failed`;
                    typeLine1.textContent = `File execution blocked.`;
                    typeLine2.textContent = `Ensure "${fileName}" is in your bucket.`;
                }
            };

            card.addEventListener('click', runSelection);
            card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); runSelection(); } });
        });

        function clearSession() {
            hudOverlay.classList.remove('visible');
            matrixAlert.classList.remove('active');
            setTimeout(() => { coreViewer.src = ""; if (activeTriggerElement) activeTriggerElement.focus(); }, 400); 
        }

        closeFrameBtn.addEventListener('click', clearSession);
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && hudOverlay.classList.contains('visible')) clearSession(); });
    </script>
</body>
</html>
