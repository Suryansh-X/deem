<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassMatrix Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: #131b2e;
            --bg-card: #1e2942;
            --border-subtle: #2d3d63;
            --brand-primary: #38bdf8;
            --brand-glow: rgba(56, 189, 248, 0.25);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-main: #f87171;
        }

        *:focus-visible {
            outline: 3px solid var(--brand-primary);
            outline-offset: 4px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* --- Secure Gate Gateway UI --- */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s ease, pointer-events 0.5s ease;
        }

        .auth-box {
            width: 100%;
            max-width: 450px;
            background: #070a12;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            position: relative;
            border: 2px solid transparent;
            background-image: linear-gradient(#070a12, #070a12), linear-gradient(0deg, #ff0055, #0099ff, #00ff66, #ff0055);
            background-origin: border-box;
            background-clip: content-box, border-box;
            background-size: 100% 100%, 100% 400%;
            animation: subtleRGB 12s linear infinite;
        }

        @keyframes subtleRGB {
            0% { background-position: 0% 0%, 0% 0%; }
            50% { background-position: 0% 0%, 0% 100%; }
            100% { background-position: 0% 0%, 0% 0%; }
        }

        .auth-box h2 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .auth-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #131b2e;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .auth-input:focus {
            border-color: var(--brand-primary);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--brand-primary);
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-error {
            color: var(--error-main);
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        /* --- Main Dashboard View Wrapper --- */
        .dashboard-wrapper {
            display: none;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 40px auto;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 8px;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card-entry {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 24px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .card-entry:hover {
            transform: translateY(-4px);
            border-color: var(--brand-primary);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.6), 0 0 20px var(--brand-glow);
        }

        .student-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .student-name {
            font-weight: 700;
            font-size: 1.25rem;
            text-transform: capitalize;
            word-break: break-word;
        }

        .student-id {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: monospace;
        }

        .action-container {
            display: flex;
            justify-content: flex-end;
        }

        .action-tag {
            color: #ffffff;
            background: var(--brand-primary);
            border: none;
            padding: 8px 18px;
            font-size: 0.875rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--brand-primary);
            padding: 60px;
            font-size: 1.15rem;
            font-weight: 500;
        }

        .hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(7, 10, 18, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .hud-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            padding: 16px 24px;
            border-radius: 12px 12px 0 0;
        }

        .mainframe-title {
            font-weight: 700;
        }

        .close-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #ef4444;
            color: #ffffff;
        }

        .terminal-workspace {
            display: flex;
            flex: 1;
            border: 1px solid var(--border-subtle);
            background: #0d1321;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            position: relative;
        }

        .viewer-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pdf-embed-object {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        .mobile-download-fallback {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--text-main);
            text-align: center;
            padding: 40px;
        }

        .fallback-btn {
            background: var(--brand-primary);
            color: #0b0f19;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1rem;
            box-shadow: 0 4px 14px var(--brand-glow);
            transition: transform 0.2s;
        }

        .fallback-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 768px) {
            .pdf-embed-object { display: block; } 
        }
    </style>
</head>
<body>

    <div id="authOverlay" class="auth-overlay">
        <div class="auth-box">
            <h2>Secure Gateway</h2>
            <p>Enter authorization key to open ClassMatrix storage nodes.</p>
            <div class="auth-form">
                <input type="password" id="passphraseInput" class="auth-input" placeholder="••••••••" autocomplete="current-password">
                <button id="authSubmitBtn" class="auth-btn">Verify Credentials</button>
            </div>
            <div id="authErrorLog" class="auth-error">Access Denied: Invalid Key Token</div>
        </div>
    </div>

    <div id="dashboardWrapper" class="dashboard-wrapper">
        <audio id="bgMusic" loop preload="auto">
            <source src="Senorita __ Zindagi Na Milegi Dobara __ Cello Instrumental Cover __ wwwsoundspiritin.mp3" type="audio/mpeg">
        </audio>

        <header>
            <h1>Student Results Dashboard</h1>
            <div class="subtitle">Select any individual student card panel below to safely load records from digital storage vault channels.</div>
        </header>

        <main id="gridTarget" class="roster-grid" aria-live="polite">
            <div class="status-msg">Scanning active storage volumes...</div>
        </main>

        <div id="hudOverlay" class="hud-overlay" role="dialog" aria-modal="true">
            <div class="terminal-header">
                <div id="mainframeTitle" class="mainframe-title">Documents Vault</div>
                <button id="closeFrameBtn" class="close-btn">Close Panel</button>
            </div>
            <div class="terminal-workspace">
                <div class="viewer-container" id="viewerContainer">
                    <object id="coreViewer" class="pdf-embed-object" type="application/pdf" data="">
                        <div class="mobile-download-fallback" id="mobileFallback">
                            <p style="font-size: 1.1rem; color: var(--text-muted);">Mobile Document Viewer Initialization Interrupted</p>
                            <a id="fallbackLink" class="fallback-btn" href="#" target="_blank">Open PDF File Manually</a>
                        </div>
                    </object>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jnoukcxlbslsyieqbvtr.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impub3VrY3hsYnNsc3lpZXFidnRyIiwicm9sZSI6ImaW5vbiIsImlhdCI6MTc3OTA0MjMyOCwiZXhwIjoyMDk0NjE4MzI4fQ.RfJGDu8tF9v3hzWrAzyKxGypxR2iUUWY15u5T8wyKZg'; 

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BUCKET_NAME = 'students-result'; 

        // DOM Elements
        const authOverlay = document.getElementById('authOverlay');
        const dashboardWrapper = document.getElementById('dashboardWrapper');
        const passphraseInput = document.getElementById('passphraseInput');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authErrorLog = document.getElementById('authErrorLog');

        const gridTarget = document.getElementById('gridTarget');
        const hudOverlay = document.getElementById('hudOverlay');
        const coreViewer = document.getElementById('coreViewer');
        const mobileFallback = document.getElementById('mobileFallback');
        const fallbackLink = document.getElementById('fallbackLink');
        const closeFrameBtn = document.getElementById('closeFrameBtn');
        const mainframeTitle = document.getElementById('mainframeTitle');
        const bgMusic = document.getElementById('bgMusic');

        let activeTriggerElement = null;
        let currentBlobUrl = null;

        // Secure RPC Verification Function (Perfect for Public Repos)
        async function verifyAccessKey() {
            const userInput = passphraseInput.value.trim();
            if(!userInput) return;

            authSubmitBtn.textContent = "Verifying...";
            authSubmitBtn.disabled = true;
            authErrorLog.style.display = "none";

            try {
                // Call the secure database function via RPC instead of querying tables directly
                const { data: isValid, error } = await supabaseClient
                    .rpc('verify_secure_password', { user_input: userInput });

                if (error) throw error;

                if (isValid === true) {
                    // Success: Remove auth screen and mount dashboard components
                    authOverlay.style.opacity = '0';
                    authOverlay.style.pointerEvents = 'none';
                    dashboardWrapper.style.display = 'block';
                    
                    fetchStorageManifest();
                    setTimeout(() => { authOverlay.remove(); }, 500);
                } else {
                    throw new Error("Invalid Credentials");
                }
            } catch (err) {
                authErrorLog.style.display = "block";
                passphraseInput.value = "";
                authSubmitBtn.textContent = "Verify Credentials";
                authSubmitBtn.disabled = false;
            }
        }

        authSubmitBtn.addEventListener('click', verifyAccessKey);
        passphraseInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') verifyAccessKey(); });

        function renderCards(filesArray) {
            gridTarget.innerHTML = '';
            filesArray.forEach(file => {
                const cleanTitle = file.name.replace('.pdf', '').replace('.PDF', '').replace(/-/g, ' ').replace(/_/g, ' ').toLowerCase();
                const nodeLabel = file.name.replace(/[^a-zA-Z0-9]/g, '_');

                const card = document.createElement('div');
                card.className = 'card-entry';
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('data-matrix', file.name);
                card.setAttribute('data-id', nodeLabel);

                card.innerHTML = `
                    <div class="student-info">
                        <span class="student-name">${cleanTitle}</span>
                        <span class="student-id">SYSTEM VAULT RECORD</span>
                    </div>
                    <div class="action-container">
                        <button class="action-tag" tabindex="-1">View Profile</button>
                    </div>
                `;
                bindCardEvents(card);
                gridTarget.appendChild(card);
            });
        }

        async function fetchStorageManifest() {
            try {
                const { data: files, error } = await supabaseClient.storage
                    .from(BUCKET_NAME)
                    .list('', { limit: 100, sortBy: { column: 'name', order: 'asc' } });

                if (error) throw error;
                const structuredFiles = files.filter(f => f.name !== '.emptyFolderPlaceholder');
                if (structuredFiles.length === 0) { useFallbackList(); return; }
                renderCards(structuredFiles);
            } catch (err) {
                useFallbackList();
            }
        }

        function useFallbackList() {
            const explicitUserFiles = [
                { name: 'AALEKH.pdf' }, { name: 'AKSHIT.pdf' }, { name: 'ANIRUDH VIJ.pdf' },
                { name: 'ARMAN.pdf' }, { name: 'DHARUN.pdf' }, { name: 'GAURY.pdf' },
                { name: 'GURLEEN K.pdf' }, { name: 'GURNOOR.pdf' }, { name: 'HARSHOUN.pdf' },
                { name: 'HARTEJ.pdf' }, { name: 'HEYMAN.pdf' }, { name: 'ISH KAUR.pdf' },
                { name: 'ISH SINGH.pdf' }, { name: 'JAPNEET.pdf' }, { name: 'JASKARAN.pdf' },
                { name: 'JASWINDERK.pdf' }, { name: 'MOULI.pdf' }, { name: 'PRAB - FAT.pdf' },
                { name: 'PRAB - ATHLETE.pdf' }, { name: 'RAGHUNANDAN.pdf' }, { name: 'RANTESH.pdf' },
                { name: 'ROHAAN SAINI.pdf' }, { name: 'ROHANPREET.pdf' }, { name: 'SACHIN.pdf' },
                { name: 'SAMIK.pdf' }, { name: 'SANIKA.pdf' }, { name: 'SHAVETA.pdf' },
                { name: 'SHEFALI.pdf' }, { name: 'SUKHNOOR.pdf' }, { name: 'SURYANSH.pdf' },
                { name: 'TANVEER.pdf' }, { name: 'THAKUR ADITYA RANA.pdf' }, { name: 'UDAY OHRI.pdf' }
            ];
            renderCards(explicitUserFiles);
        }

        function bindCardEvents(cardElement) {
            const runSelection = async () => {
                activeTriggerElement = cardElement;
                if (bgMusic.paused) { bgMusic.play().catch(() => {}); }
                
                const fileName = cardElement.getAttribute('data-matrix');
                const targetName = cardElement.getAttribute('data-id');

                mainframeTitle.textContent = `Connecting Secure Vault...`;
                mobileFallback.style.display = "none";
                hudOverlay.classList.add('visible');

                try {
                    const { data, error } = await supabaseClient.storage
                        .from(BUCKET_NAME)
                        .download(fileName);

                    if (error) throw error;

                    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);

                    currentBlobUrl = URL.createObjectURL(data);
                    
                    coreViewer.removeAttribute('data');
                    coreViewer.setAttribute('data', currentBlobUrl);
                    
                    fallbackLink.href = currentBlobUrl;
                    mobileFallback.style.display = "flex"; 
                    
                    mainframeTitle.textContent = `Profile Sheet Open: ${targetName.toUpperCase().replace(/_/g, ' ')}`;

                    if (window.innerWidth < 768) {
                        window.open(currentBlobUrl, '_blank');
                    }

                } catch (err) {
                    mainframeTitle.textContent = `Access Failed`;
                    mobileFallback.style.display = "flex";
                    fallbackLink.textContent = "Error Loading Asset Buffer";
                    fallbackLink.href = "#";
                }
            };

            cardElement.addEventListener('click', runSelection);
            cardElement.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); runSelection(); } });
        }

        function clearSession() {
            hudOverlay.classList.remove('visible');
            setTimeout(() => { 
                coreViewer.setAttribute('data', ''); 
                if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
                if (activeTriggerElement) activeTriggerElement.focus(); 
            }, 400); 
        }

        closeFrameBtn.addEventListener('click', clearSession);
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && hudOverlay.classList.contains('visible')) clearSession(); });
    </script>
</body>
</html>
